<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 100px;
    max-width: 500px;
    margin: 0 auto;
  }
  #lockScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  #lockScreen.hidden { display: none; }
  .lock-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 30px; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 30px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent; transition: all 0.15s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--red); border-color: var(--red); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .pin-key {
    width: 72px; height: 52px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 22px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    user-select: none; transition: background 0.1s;
  }
  .pin-key:active { background: var(--accent-dim); }
  .pin-key.empty { visibility: hidden; }
  .pin-key.back { font-size: 16px; color: var(--muted); }

  /* App styles - loaded with decrypted content */
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .selector-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .selector-row label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
  .selector-row .col { flex: 1; }
  .pill-group { display: flex; gap: 4px; }
  .pill {
    flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .week-strip {
    display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none;
  }
  .week-strip::-webkit-scrollbar { display: none; }
  .week-pill {
    min-width: 44px; padding: 8px 0; text-align: center; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
    color: var(--muted); cursor: pointer; flex-shrink: 0;
  }
  .week-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .week-pill.deload { border-color: #3a3020; color: var(--orange); }
  .week-pill.deload.active { background: #2a2010; border-color: var(--orange); }
  .week-banner {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.5;
  }
  .week-banner .phase { font-weight: 700; color: var(--accent); }
  .week-banner .phase.deload { color: var(--orange); }
  .week-banner .detail { color: var(--muted); }
  .exercise-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 8px;
  }
  .exercise-card .num {
    display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center;
    border-radius: 6px; background: var(--accent-dim); color: var(--accent);
    font-size: 12px; font-weight: 700; margin-right: 8px;
  }
  .exercise-card .name { font-weight: 600; font-size: 15px; }
  .exercise-card .meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .exercise-card .meta-item { display: flex; flex-direction: column; min-width: 60px; }
  .exercise-card .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 2px; }
  .exercise-card .meta-value { font-size: 15px; font-weight: 600; }
  .exercise-card .note { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.4; }
  .rir-easy { color: var(--green); }
  .rir-mod { color: var(--accent); }
  .rir-hard { color: var(--orange); }
  .rir-max { color: var(--red); }
  .rest-badge { font-size: 11px; color: var(--muted); background: var(--bg); border-radius: 6px; padding: 2px 8px; display: inline-block; margin-top: 6px; }
  .warmup-toggle {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 16px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600;
  }
  .warmup-toggle .arrow { color: var(--muted); transition: transform 0.2s; }
  .warmup-toggle.open .arrow { transform: rotate(90deg); }
  .warmup-content {
    display: none; background: var(--card); border: 1px solid var(--border); border-top: 0;
    border-radius: 0 0 10px 10px; padding: 12px 14px; margin-top: -18px; margin-bottom: 16px;
    font-size: 13px; line-height: 1.7; color: var(--muted);
  }
  .warmup-content.show { display: block; }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-title">Workout Tracker</div>
  <div class="lock-sub">Enter PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key back" onclick="pinBack()">&#9003;</div>
  </div>
</div>

<div id="appContent"></div>

let pinEntry = "";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("d" + i);
    dot.classList.toggle("filled", i < pinEntry.length);
    dot.classList.remove("error");
  }
}

async function decrypt(pin) {
  const enc = new TextEncoder();
  const salt = b64ToBytes(ENC.salt);
  const iv = b64ToBytes(ENC.iv);
  const ct = b64ToBytes(ENC.ct);

  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );

  const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
  return new TextDecoder().decode(plainBuf);
}

async function pinPress(n) {
  if (pinEntry.length >= 4) return;
  pinEntry += n;
  updateDots();
  if (pinEntry.length === 4) {
    try {
      const html = await decrypt(pinEntry);
      document.getElementById("lockScreen").classList.add("hidden");
      const app = document.getElementById("appContent");
      app.innerHTML = html;
      // Execute any script tags in the decrypted content
      const scripts = app.querySelectorAll("script");
      scripts.forEach(s => {
        const ns = document.createElement("script");
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
      });
    } catch (e) {
      for (let i = 0; i < 4; i++) {
        document.getElementById("d" + i).classList.add("error");
      }
      setTimeout(() => { pinEntry = ""; updateDots(); }, 600);
    }
  }
}

function pinBack() {
  if (pinEntry.length > 0) {
    pinEntry = pinEntry.slice(0, -1);
    updateDots();
  }
}
</script>
</body>
</html>
